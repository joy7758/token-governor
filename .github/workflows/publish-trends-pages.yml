name: Publish Trends Pages

on:
  push:
    branches: ["main"]
    paths:
      - "docs/index.html"
      - "docs/trends/**"
      - "docs/badges/**"
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: true

jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Check Pages configuration
        id: pages_status
        uses: actions/github-script@v7
        with:
          script: |
            const { owner, repo } = context.repo;
            try {
              const response = await github.request("GET /repos/{owner}/{repo}/pages", {
                owner,
                repo,
              });
              core.setOutput("enabled", "true");
              core.info(`Pages site found: ${response.data.html_url || "configured"}`);
            } catch (error) {
              if (error.status === 404) {
                core.setOutput("enabled", "false");
                core.notice("GitHub Pages is not enabled for this repository. Skipping deploy.");
                return;
              }
              throw error;
            }

      - name: Note skipped deploy
        if: steps.pages_status.outputs.enabled != 'true'
        run: |
          {
            echo "## Pages deploy skipped"
            echo ""
            echo "GitHub Pages is not enabled for this repository."
            echo "Enable Pages in repository settings, then rerun this workflow."
          } >> "${GITHUB_STEP_SUMMARY}"

      - name: Setup Pages
        if: steps.pages_status.outputs.enabled == 'true'
        uses: actions/configure-pages@v5

      - name: Upload artifact
        if: steps.pages_status.outputs.enabled == 'true'
        uses: actions/upload-pages-artifact@v3
        with:
          path: docs

      - name: Deploy to GitHub Pages
        if: steps.pages_status.outputs.enabled == 'true'
        id: deployment
        uses: actions/deploy-pages@v4
