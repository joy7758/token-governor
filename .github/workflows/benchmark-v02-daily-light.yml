name: Daily Benchmark v0.2 Light

on:
  schedule:
    # Daily at 02:00 UTC
    - cron: "0 2 * * *"
  workflow_dispatch:
    inputs:
      limit:
        description: "Task limit for light run"
        type: string
        required: false
        default: "20"
      model:
        description: "Model selector (e.g. auto, openai:gpt-4o-mini)"
        type: string
        required: false
        default: "auto"
      outdir:
        description: "Output directory"
        type: string
        required: false
        default: "metrics/reports/daily-light-dashboard"
      mode:
        description: "Optimized mode for guardrail checks"
        type: string
        required: false
        default: "governor"
      max_success_drop_pp:
        description: "Guardrail: max success rate drop in percentage points"
        type: string
        required: false
        default: "2.0"
      max_token_increase_pct:
        description: "Guardrail: max mean token increase percent"
        type: string
        required: false
        default: "25.0"
      max_latency_increase_pct:
        description: "Guardrail: max mean latency increase percent"
        type: string
        required: false
        default: "50.0"
      maintainers:
        description: "Comma-separated GitHub usernames to mention on guardrail failure"
        type: string
        required: false
        default: ""
      guardrail_labels:
        description: "Comma-separated labels for guardrail issue"
        type: string
        required: false
        default: "benchmark-guardrail,needs-investigation,daily-light"

permissions:
  contents: read
  issues: write

jobs:
  benchmark-daily-light:
    runs-on: ubuntu-latest
    timeout-minutes: 120

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Check benchmark credentials
        id: benchmark_creds
        env:
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          GOOGLE_API_KEY: ${{ secrets.GOOGLE_API_KEY }}
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
        run: |
          if [[ -n "${OPENAI_API_KEY}" || -n "${GOOGLE_API_KEY}" || -n "${GEMINI_API_KEY}" ]]; then
            echo "available=true" >> "${GITHUB_OUTPUT}"
            echo "Benchmark API credentials detected."
            exit 0
          fi

          echo "available=false" >> "${GITHUB_OUTPUT}"
          {
            echo "## Benchmark skipped"
            echo ""
            echo "No benchmark API secret is configured for this repository."
            echo "Expected one of: \`OPENAI_API_KEY\`, \`GOOGLE_API_KEY\`, or \`GEMINI_API_KEY\`."
          } >> "${GITHUB_STEP_SUMMARY}"
          echo "Skipping benchmark run because no API secrets are configured."

      - name: Run light benchmark + validator + dashboard + report
        if: steps.benchmark_creds.outputs.available == 'true'
        env:
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          GOOGLE_API_KEY: ${{ secrets.GOOGLE_API_KEY }}
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          LIMIT: ${{ inputs.limit || '20' }}
          MODEL: ${{ inputs.model || 'auto' }}
          TASKS_FILE: metrics/benchmarks/benchmark_v02_60_tasks.json
          POLICY_FILE: policy.yaml
          DATA_DIR: metrics/data
          OUTDIR: ${{ inputs.outdir || 'metrics/reports/daily-light-dashboard' }}
          RUN_LABEL: daily-light
          HISTORY_FILE: metrics/reports/all_runs_history.jsonl
          TRENDS_OUT_DIR: docs/trends
          BADGES_OUT_DIR: docs/badges
          KPI_OUT_DIR: docs/trends
          ENABLE_HISTORY: "true"
          ENABLE_TRENDS: "true"
          ENABLE_BADGES: "true"
          ENABLE_KPI: "true"
          UPDATE_README: "false"
        run: |
          bash scripts/run-benchmark-v02-dashboard.sh

      - name: Guardrail check
        id: guardrail
        if: steps.benchmark_creds.outputs.available == 'true'
        continue-on-error: true
        env:
          OUTDIR: ${{ inputs.outdir || 'metrics/reports/daily-light-dashboard' }}
          MODE: ${{ inputs.mode || 'governor' }}
          MAX_SUCCESS_DROP_PP: ${{ inputs.max_success_drop_pp || '2.0' }}
          MAX_TOKEN_INCREASE_PCT: ${{ inputs.max_token_increase_pct || '25.0' }}
          MAX_LATENCY_INCREASE_PCT: ${{ inputs.max_latency_increase_pct || '50.0' }}
        run: |
          python scripts/check_benchmark_guardrails.py \
            --comparison "${OUTDIR}/comparison.json" \
            --mode "${MODE}" \
            --max-success-drop-pp "${MAX_SUCCESS_DROP_PP}" \
            --max-token-increase-pct "${MAX_TOKEN_INCREASE_PCT}" \
            --max-latency-increase-pct "${MAX_LATENCY_INCREASE_PCT}" \
            --out-json "${OUTDIR}/guardrail.json" \
            --out-markdown "${OUTDIR}/guardrail.md"

      - name: Upload light benchmark artifacts
        if: always() && steps.benchmark_creds.outputs.available == 'true'
        uses: actions/upload-artifact@v4
        with:
          name: daily-light-benchmark-artifacts
          path: |
            ${{ inputs.outdir || 'metrics/reports/daily-light-dashboard' }}/**
            metrics/data/baseline-v02.jsonl
            metrics/data/governor-v02.jsonl
            metrics/reports/all_runs_history.jsonl
            docs/trends/**
            docs/badges/**
          if-no-files-found: warn

      - name: Create issue on guardrail failure
        if: steps.benchmark_creds.outputs.available == 'true' && steps.guardrail.outcome == 'failure'
        uses: actions/github-script@v7
        env:
          OUTDIR: ${{ inputs.outdir || 'metrics/reports/daily-light-dashboard' }}
          MAINTAINERS: ${{ inputs.maintainers || '' }}
          GUARDRAIL_LABELS: ${{ inputs.guardrail_labels || 'benchmark-guardrail,needs-investigation,daily-light' }}
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            const fs = require('fs');
            const path = process.env.OUTDIR + '/guardrail.md';
            let body = 'Guardrail failed, but guardrail markdown was not found.';
            if (fs.existsSync(path)) {
              body = fs.readFileSync(path, 'utf8');
            }

            const today = new Date().toISOString().slice(0, 10);
            const title = `[Daily Light] Benchmark guardrail failed - ${today}`;
            const labels = (process.env.GUARDRAIL_LABELS || '')
              .split(',')
              .map(x => x.trim())
              .filter(Boolean);
            const maintainers = (process.env.MAINTAINERS || '')
              .split(',')
              .map(x => x.trim().replace(/^@/, ''))
              .filter(Boolean);
            const mentionLine = maintainers.length > 0
              ? `Maintainers: ${maintainers.map(u => `@${u}`).join(' ')}\n\n`
              : '';
            const runUrl = `https://github.com/${context.repo.owner}/${context.repo.repo}/actions/runs/${context.runId}`;
            const issueBody = `${mentionLine}${body}\n\n---\nWorkflow run: ${runUrl}`;

            const { owner, repo } = context.repo;
            const openIssues = await github.paginate(github.rest.issues.listForRepo, {
              owner,
              repo,
              state: 'open',
              labels: labels.join(','),
              per_page: 100,
            });

            const existing = openIssues.find(issue => issue.title === title);
            if (existing) {
              const commentBody = [
                'Guardrail failed again in the same day run; refreshing context.',
                '',
                issueBody,
              ].join('\n');
              await github.rest.issues.createComment({
                owner,
                repo,
                issue_number: existing.number,
                body: commentBody,
              });
              core.info(`Guardrail issue already exists (#${existing.number}), appended comment.`);
              return;
            }

            await github.rest.issues.create({
              owner,
              repo,
              title,
              body: issueBody,
              labels
            });

      - name: Notify channels on guardrail failure
        if: steps.benchmark_creds.outputs.available == 'true' && steps.guardrail.outcome == 'failure'
        continue-on-error: true
        env:
          OUTDIR: ${{ inputs.outdir || 'metrics/reports/daily-light-dashboard' }}
          SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}
          DINGTALK_WEBHOOK_URL: ${{ secrets.DINGTALK_WEBHOOK_URL }}
          EMAIL_SMTP_SERVER: ${{ secrets.EMAIL_SMTP_SERVER }}
          EMAIL_SMTP_PORT: ${{ secrets.EMAIL_SMTP_PORT }}
          EMAIL_USER: ${{ secrets.EMAIL_USER }}
          EMAIL_PASSWORD: ${{ secrets.EMAIL_PASSWORD }}
          EMAIL_TO: ${{ secrets.EMAIL_TO }}
        run: |
          TITLE="Benchmark Guardrail Alert (Daily Light)"
          BODY_FILE="${OUTDIR}/guardrail.md"
          python scripts/notify_slack.py --title "${TITLE}" --text-file "${BODY_FILE}"
          python scripts/notify_dingtalk.py --msg-file "${BODY_FILE}"
          python scripts/notify_email.py --subject "${TITLE}" --body-file "${BODY_FILE}"

      - name: Fail job when guardrail fails
        if: steps.benchmark_creds.outputs.available == 'true' && steps.guardrail.outcome == 'failure'
        run: |
          echo "Guardrail check failed. See issue/artifacts for details."
          exit 1
